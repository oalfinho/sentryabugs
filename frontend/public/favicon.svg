<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo arredondado escuro -->
  <rect width="32" height="32" rx="8" fill="#0F1923"/>

  <!-- Arco superior do "S" — forma de radar/sensor -->
  <path
    d="M22 10.5C22 10.5 20 8 16 8C11 8 8 11.5 8 14.5C8 17.5 10.5 19 13.5 19.5L18.5 20.5C20.5 21 24 22 24 25C24 28 20.5 30 16 30"
    stroke="url(#grad1)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Linha de pulso (waveform) no meio -->
  <polyline
    points="7,16 10,16 12,11 14,21 16,14 18,18 21,16 25,16"
    stroke="url(#grad2)"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Ponto de alerta -->
  <circle cx="16" cy="16" r="1.5" fill="#3B657A" opacity="0.9"/>

  <defs>
    <linearGradient id="grad1" x1="8" y1="8" x2="24" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B657A"/>
      <stop offset="100%" stop-color="#5fa8c8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="7" y1="16" x2="25" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B657A" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#5fa8c8"/>
      <stop offset="100%" stop-color="#3B657A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
