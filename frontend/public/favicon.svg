<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo hexagonal -->
  <polygon
    points="16,2 28,9 28,23 16,30 4,23 4,9"
    fill="#123142"
    stroke="#3b657a"
    stroke-width="1.5"
  />
  <!-- Hexágono interno menor -->
  <polygon
    points="16,7 23.5,11.5 23.5,20.5 16,25 8.5,20.5 8.5,11.5"
    fill="none"
    stroke="#3b657a"
    stroke-width="1"
    opacity="0.6"
  />
  <!-- Ponto central creme -->
  <circle cx="16" cy="16" r="2.5" fill="#fdf9de" />
  <!-- Linhas diagonais estilo circuit/sensor -->
  <line x1="16" y1="7" x2="16" y2="11" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="25" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23.5" y1="11.5" x2="20" y2="13.5" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8.5" y1="20.5" x2="12" y2="18.5" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23.5" y1="20.5" x2="20" y2="18.5" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8.5" y1="11.5" x2="12" y2="13.5" stroke="#3b657a" stroke-width="1.2" stroke-linecap="round"/>
</svg>
